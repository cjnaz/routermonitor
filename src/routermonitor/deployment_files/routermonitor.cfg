# routermonitor config file - 4.0

LogLevel            20      # Logging module levels: 10:DEBUG, 20:INFO, 30:WARNING (default), 40:ERROR, 50:CRITICAL
                                # 20:  Log new clients, and log IP and IP expiry changes
                                # 30:  Log new clients only
LogFile             log_routermonitor.txt   # Absolute path, or relative to ~/.config/routermonitor
PrintLogLength      40
ConsoleLogFormat    {levelname:>8}:  {message}
#ConsoleLogFormat    {module:>15}.{funcName:20} - {levelname:>8}:  {message}          # Default
#FileLogFormat       {asctime} {module:>15}.{funcName:20} {levelname:>8}:  {message}  # Default

# Service mode update interval
UpdateInterval      15m             # Time units: (s)econds, (m)inutes, (h)ours, (d)ays, (w)eeks

# sqlite3 DB params
DB_File             network-clients.db      # Absolute path, or relative to ~/.local/share/routermonitor
DB_Table            clients


# Formatting for --list-db and --list-dhcp-server
# hostname_field_width 25         # Adjust for longest hostname (default 25)
# device_field_width  20          # Adjust for a reasonable tradeoff between longest device name value and overall report width (default 30)
# macoui_field_width  30          # Adjust for a reasonable tradeoff between longest MACOUI value and overall report width (default 30)

# Default sort order for --list-db and --list-dhcp-server
# Command line --sort-b overrides SortBy
# SortBy              hostname    # One of hostname, IP, first_seen, last_seen, expiry, device, mac, macoui, notes (default hostname)


# Sources declares which sections within this config file will be processed (in listed order) for each DHCP clients update.
# The format is a list of strings.  In a single pfSense setup there will be only one source listed.
# The section names are user-defined, and found clients are merged into a single list.
Sources =           ['pfsense MIMAPI', 'pfsense unofficialAPI', 'pfsense scrape']

# A Source section declares the mode of access to DHCP lease information
# Mode options are:
    # MIM_API           Access the pfSense+ MIM API
    # Unofficial-APIV2  Access the Unofficial API V2
    # Page_Scrape       Access the pfSense GUI page Status > DHCP Leases 


[pfsense MIMAPI]
Mode =              MIM_API
# CONTROLLER_URL is the pfSense+ device that is providing the MIM API interface, typically at port 8443
CONTROLLER_URL =    https://pfsense.my.lan:8443
# DEVICES is a list of pfSense+ devices that are registered on the CONTROLLER_URL
# DEVICES =           ['localhost']   # default ['localhost']
# CERT_PATH is the full path to the certificate file exported from the pfSense+ CONTROLLER_URL device (System > Certificates > Certificates > Export Certificate)
# This cert file is used for API access.  Set to False (default) to disable certificate-based access control
# CERT_PATH =         False           # default False
# USER and PASS are the pfSense+ GUI login credentials.  These should be placed in a credentials file with user-only access permissions
import              ~/creds_routermonitor


[pfsense unofficialAPI]
Mode =              Unofficial_APIV2
# URL is a pfSense (+ or CE) device with the Unofficial API V2 enabled
URL =               https://pfsense.my.lan
# The API_KEY is generated at System > REST API > Keys.  (Set the System > REST API > Settings > Security > Authentication Methods to Key)
API_KEY =           "123458b4aa4dd66e86340420e4b12345"


[pfsense scrape]
Mode =              Page_Scrape
# URL is a pfSense (+ or CE) device
URL =               https://pfsense.my.lan
# USER and PASS are the pfSense+ GUI login credentials.  These should be placed in a credentials file with user-only access permissions
import              ~/creds_routermonitor
# Page_timeout specifies how long to wait for each stage of the pfSense login and page access process
# Page_timeout =      10s             # default 10s



# Email and Notification params
[SMTP]              # See https://github.com/cjnaz/cjnfuncs/blob/main/SMTP.md for setup info
import              creds_SMTP  # Provides EmailServer, EmailServerPort, EmailUser, EmailPass, EmailFrom   Absolute path, or relative to core.tool.config_dir
NotifList           4809991234@vzwpix.com  # One or more, space separated.  Use your carrier's email-to-text bridge address.  Regular email addresses may be used.
#EmailVerbose        True        # True: enable the emailer debug level
#DontEmail           True        # True: Emails (including notifications) will NOT be sent
#DontNotif           True        # True: Notifications will NOT be sent
